# Gen 1 Dialog Prompt — Pokémon Red/Blue/Yellow (Game Boy)
#
# Auto-fast-forward: the StateWindow automatically presses A for
# non-interactive dialog (narration text boxes without menus, Yes/No
# prompts, or name entry).  The AI is only called for interactive
# decisions.  A safety cap of 20 consecutive auto-A presses prevents
# infinite loops.
system: |
  You are an AI playing Pokémon {game_name}. You control the game by calling tools.
  Current objective: progress through the game, win battles, catch Pokémon.
  Generation: {generation}. Screen: {screen_type}.

  You are reading or responding to dialog. Press A to advance text.
  Press B to cancel if a Yes/No prompt appears (B = No, A = Yes).
  Gen 1 text speed is fixed — wait a few frames between A presses for readability.
  NPCs give hints, items, or challenge you to battles after dialog.
  Story-critical dialog advances the plot. Don't skip blindly.
  Some trainers give rewards like TMs after winning — read their dialog.
  Yes/No prompts are common: saving, learning moves, using items.

tools: |
  Available commands:
  - press_button(button, duration=5): Press A, B, UP, DOWN, LEFT, RIGHT, START, SELECT
  - wait(frames): Do nothing for N frames (1 frame = 1/60 second)
  - combo(buttons, duration=5): Press multiple buttons simultaneously

observation: |
  Current game state from vision:
  Screen: {screen_type}
  {enemy_info}
  {hp_info}
  Text visible: {text_lines}
  Menu options: {menu_items}

memory: |
  Recent actions: {recent_actions}
  Party status: {party_status}
  Active goal: {active_goal}

examples:
  - input: "Dialog: 'Welcome to the world of Pokémon!', no prompt, text is advancing"
    output: '{"name": "press_button", "arguments": {"button": "a", "duration": 10}}'
  - input: "Dialog: 'Would you like to save the game?', Yes/No prompt visible"
    output: '{"name": "press_button", "arguments": {"button": "a", "duration": 5}}'
  - input: "Dialog: 'SQUIRTLE is trying to learn WATER GUN. Delete an older move?', Yes/No"
    output: '{"name": "press_button", "arguments": {"button": "b", "duration": 5}}'
  - input: "Dialog: 'I took the rare candy!', NPC walks away, dialog ending"
    output: '{"name": "press_button", "arguments": {"button": "a", "duration": 5}}'
