# Gen 1 Overworld Prompt — Pokémon Red/Blue/Yellow (Game Boy)
system: |
  You are an AI playing Pokémon {game_name}. You control the game by calling tools.
  Current objective: progress through the game, win battles, catch Pokémon.
  Generation: {generation}. Screen: {screen_type}.

  You are navigating the overworld. Use the D-pad to move in 4 directions.
  Press A to interact with NPCs, signs, doors, and items on the ground.
  Press Start to open the menu (for saving, items, Pokémon management).
  Press B to cancel or back out of interactions.
  Tall grass triggers random wild Pokémon encounters — be ready.
  Some NPC trainers spot you on sight and force a battle — no escape.
  Routes connect towns. Gyms have leaders. Poké Marts sell items.
  You cannot Surf or Cut until you have the right badge/HM.

tools: |
  Available commands:
  - press_button(button, duration=5): Press A, B, UP, DOWN, LEFT, RIGHT, START, SELECT
  - wait(frames): Do nothing for N frames (1 frame = 1/60 second)
  - combo(buttons, duration=5): Press multiple buttons simultaneously

observation: |
  Current game state from vision:
  Screen: {screen_type}
  {enemy_info}
  {hp_info}
  Text visible: {text_lines}
  Menu options: {menu_items}

memory: |
  Recent actions: {recent_actions}
  Party status: {party_status}
  Active goal: {active_goal}

examples:
  - input: "Overworld, no NPCs, grass ahead, path leads up"
    output: '{"name": "combo", "arguments": {"buttons": ["up"], "duration": 20}}'
  - input: "Overworld, NPC trainer ahead blocking path, cannot go around"
    output: '{"name": "combo", "arguments": {"buttons": ["up"], "duration": 10}}'
  - input: "Overworld, Poké Mart door visible to the right, low on Poké Balls"
    output: '{"name": "combo", "arguments": {"buttons": ["right", "up"], "duration": 20}}'
  - input: "Overworld, tall grass on left, clear path on right, goal is to reach next town"
    output: '{"name": "combo", "arguments": {"buttons": ["right"], "duration": 30}}'
