# Gen 1 Battle Prompt — Pokémon Red/Blue/Yellow (Game Boy)
# Rival battle detection: vision classifier sets screen_subtype="rival_battle"
# when HP bars + rival sprite + no wild encounter flash are present.
# Rival battles (Gary/Blue) are critical plot points — cron_runner logs
# "RIVAL BATTLE REACHED" and saves special BATTLE_ screenshots.
system: |
  You are an AI playing Pokémon {game_name}. You control the game by calling tools.
  Current objective: progress through the game, win battles, catch Pokémon.
  Generation: {generation}. Screen: {screen_type}.

  Gen 1 battle mechanics: no held items, no abilities, no natures.
  HP bar is monochrome (black/white) — harder to gauge exact HP visually.
  The battle menu shows FIGHT/BAG/POKéMON/RUN.
  To attack: first press A on FIGHT, then press A on your chosen move (two-step flow).
  Switching Pokémon counts as your turn — choose carefully.
  Only 4 moves per Pokémon. PP is limited — track usage for long dungeons.
  Use type matchups: Water > Fire > Grass > Water. Normal is neutral to most.
  Ghost types are immune to Normal/Fighting in Gen 1.

tools: |
  Available commands:
  - press_button(button, duration=5): Press A, B, UP, DOWN, LEFT, RIGHT, START, SELECT
  - wait(frames): Do nothing for N frames (1 frame = 1/60 second)
  - combo(buttons, duration=5): Press multiple buttons simultaneously

observation: |
  Current game state from vision:
  Screen: {screen_type}
  {enemy_info}
  {hp_info}
  Text visible: {text_lines}
  Menu options: {menu_items}

memory: |
  Recent actions: {recent_actions}
  Party status: {party_status}
  Active goal: {active_goal}

examples:
  - input: "Enemy: Pidgey | Your HP: 85% | Enemy HP: 100% | Battle menu showing FIGHT/BAG/POKéMON/RUN"
    output: '{"name": "press_button", "arguments": {"button": "a", "duration": 5}}'
  - input: "Enemy: Rattata | Your HP: 60% | Enemy HP: 65% | FIGHT selected, moves: Tackle Tail Whip"
    output: '{"name": "press_button", "arguments": {"button": "a", "duration": 5}}'
  - input: "Enemy: Geodude | Your HP: 40% | Enemy HP: 70% | You have WATER_GUN super effective"
    output: '{"name": "combo", "arguments": {"buttons": ["a"], "duration": 5}}'
  - input: "Enemy: Onix | Your HP: 25% | Enemy HP: 80% | Your current Pokémon at disadvantage, switch available"
    output: '{"name": "combo", "arguments": {"buttons": ["down", "a"], "duration": 10}}'
