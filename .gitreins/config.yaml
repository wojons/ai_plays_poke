guards:
  secrets: true
  lint: true
  lsp: true
  lsp_tools: ["pylsp"]
  tests: true
  test_mode: diff
  test_command: ./venv/bin/pytest -x --tb=short
  static_analysis: false
  static_analysis_tools:
    python:
    - mypy
    - pyright
evaluator:
  max_iterations: 25
  lsp_diagnostics: true
  static_analysis_diagnostics: false
history:
  enabled: true
  storage: git
  max_verdicts: 1000
